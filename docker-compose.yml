services:
  db:
    image: mariadb:latest
    container_name: quiz-db
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: Evaluacion
      MARIADB_USER: quizuser
      MARIADB_PASSWORD: quizpass
    ports:
      - "3306:3306"
    volumes:
      # ESTA LÍNEA ES MAGIA:
      # Copia tu schema local a una carpeta especial de MariaDB 
      # que ejecuta los .sql automáticamente al crear el contenedor.
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro